<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#eef2f7;
}

header{
    background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:30px;
    text-align:center;
}

section{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input{
    padding:10px;
    width:60%;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:8px 12px;
    border:none;
    background:#203a43;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#00c3ff;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#f4f6f9;
    margin:10px 0;
    padding:10px;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.excluir{
    background:red;
}

.links a{
    display:block;
    margin:10px 0;
    color:#203a43;
    font-weight:bold;
    text-decoration:none;
}

footer{
    background:#1c2833;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
<h1>🎒 Mochila Digital</h1>
<p>Organize suas matérias</p>
</header>

<section>
<h2>Adicionar Matéria</h2>

<input type="text" id="materiaInput" placeholder="Digite o nome da matéria">
<button onclick="adicionarMateria()">Adicionar</button>

<h2>Matérias na Mochila</h2>
<ul id="listaMaterias"></ul>
</section>

<section class="links">
<h2>🎮 Jogos Educativos</h2>
<a href="jogos-matematicos.html">Ir para Jogos de Matemática</a>
<a href="jogos-portugues.html">Ir para Jogos de Português</a>
</section>

<footer>
<p>© 2026 Mochila Digital</p>
</footer>

<script>

let lista = document.getElementById("listaMaterias");

window.onload = function(){
    let materias = JSON.parse(localStorage.getItem("materias")) || [];
    materias.forEach(m => criarItem(m));
};

function adicionarMateria(){
    let input = document.getElementById("materiaInput");
    let nome = input.value.trim();

    if(nome === "") return;

    criarItem(nome);
    salvar(nome);
    input.value="";
}

function criarItem(nome){
    let li = document.createElement("li");
    li.innerHTML = `
        ${nome}
        <button class="excluir" onclick="removerMateria(this,'${nome}')">Excluir</button>
    `;
    lista.appendChild(li);
}

function salvar(nome){
    let materias = JSON.parse(localStorage.getItem("materias")) || [];
    materias.push(nome);
    localStorage.setItem("materias", JSON.stringify(materias));
}

function removerMateria(botao,nome){
    botao.parentElement.remove();
    let materias = JSON.parse(localStorage.getItem("materias")) || [];
    materias = materias.filter(m => m !== nome);
    localStorage.setItem("materias", JSON.stringify(materias));
}

</script>

</body>
</html>
