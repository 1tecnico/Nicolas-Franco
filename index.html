<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

header{
    background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:30px;
    text-align:center;
}

section{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
    padding:10px;
    width:60%;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    border:none;
    background:#203a43;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#00c3ff;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#f2f2f2;
    margin:10px 0;
    padding:10px;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
}

.remover{
    background:red;
    padding:5px 10px;
}
</style>
</head>

<body>

<header>
<h1>🎒 Minha Mochila Digital</h1>
<p>Adicione suas matérias do 2º Ano</p>
</header>

<section>
<h2>Adicionar Matéria</h2>

<input type="text" id="materiaInput" placeholder="Digite o nome da matéria">
<button onclick="adicionarMateria()">Adicionar</button>

<h2>Matérias na Mochila</h2>
<ul id="listaMaterias"></ul>
</section>

<script>

let lista = document.getElementById("listaMaterias");

// Carregar matérias salvas
window.onload = function(){
    let materiasSalvas = JSON.parse(localStorage.getItem("materias")) || [];
    materiasSalvas.forEach(m => criarItem(m));
};

function adicionarMateria(){
    let input = document.getElementById("materiaInput");
    let nome = input.value.trim();

    if(nome === "") return;

    criarItem(nome);
    salvarMateria(nome);

    input.value = "";
}

function criarItem(nome){
    let li = document.createElement("li");
    li.textContent = nome;

    let btn = document.createElement("button");
    btn.textContent = "Remover";
    btn.className = "remover";
    btn.onclick = function(){
        li.remove();
        removerMateria(nome);
    };

    li.appendChild(btn);
    lista.appendChild(li);
}

function salvarMateria(nome){
    let materias = JSON.parse(localStorage.getItem("materias")) || [];
    materias.push(nome);
    localStorage.setItem("materias", JSON.stringify(materias));
}

function removerMateria(nome){
    let materias = JSON.parse(localStorage.getItem("materias")) || [];
    materias = materias.filter(m => m !== nome);
    localStorage.setItem("materias", JSON.stringify(materias));
}

</script>

</body>
</html>
