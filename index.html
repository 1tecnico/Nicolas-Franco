<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#dfe9f3,#ffffff);
}

header{
background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
color:white;
padding:30px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

section{
max-width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

input{
padding:12px;
width:60%;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:10px 14px;
border:none;
background:#203a43;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#00c3ff;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f4f6f9;
margin:10px 0;
padding:12px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.excluir{
background:#e74c3c;
}

.excluir:hover{
background:#ff6b5e;
}

footer{
background:#1c2833;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

/* Calculadora */

.calculadora{
position:fixed;
right:20px;
bottom:20px;
width:220px;
background:#1c2833;
padding:15px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
color:white;
}

.calculadora input{
width:100%;
margin-bottom:10px;
padding:10px;
font-size:18px;
border:none;
border-radius:5px;
text-align:right;
}

.calculadora button{
width:45px;
margin:3px;
background:#34495e;
}

.calculadora button:hover{
background:#00c3ff;
}

/* Quiz */

.quiz{
margin-top:30px;
}

.pergunta{
background:#f4f6f9;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

.pergunta input{
width:80px;
margin-left:10px;
}

.resultado{
margin-top:15px;
font-weight:bold;
font-size:18px;
}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Digital</h1>
<p>Organize suas matérias</p>
</header>

<section>

<h2>Adicionar Matéria</h2>

<input type="text" id="materiaInput" placeholder="Digite o nome da matéria">
<button onclick="adicionarMateria()">Adicionar</button>

<h2>Matérias na Mochila</h2>
<ul id="listaMaterias"></ul>

</section>

<section class="quiz">

<h2>🧠 Desafio de Matemática</h2>

<div class="pergunta">
4 + 6 = <input id="p1">
</div>

<div class="pergunta">
9 × 3 = <input id="p2">
</div>

<div class="pergunta">
15 - 7 = <input id="p3">
</div>

<div class="pergunta">
20 ÷ 4 = <input id="p4">
</div>

<button onclick="corrigir()">Ver Resultado</button>

<div class="resultado" id="resultado"></div>

</section>

<footer>
<p>© 2026 Mochila Digital</p>
</footer>

<!-- Calculadora -->

<div class="calculadora">

<input id="calcDisplay" disabled>

<div>
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>
</div>

<div>
<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>
</div>

<div>
<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button>
</div>

<div>
<button onclick="add('0')">0</button>
<button onclick="limpar()">C</button>
<button onclick="calcular()">=</button>
<button onclick="add('+')">+</button>
</div>

</div>

<script>

let lista = document.getElementById("listaMaterias");

window.onload = function(){
let materias = JSON.parse(localStorage.getItem("materias")) || [];
materias.forEach(m => criarItem(m));
};

function adicionarMateria(){
let input = document.getElementById("materiaInput");
let nome = input.value.trim();

if(nome === "") return;

criarItem(nome);
salvar(nome);
input.value="";
}

function criarItem(nome){
let li = document.createElement("li");
li.innerHTML = `
${nome}
<button class="excluir" onclick="removerMateria(this,'${nome}')">Excluir</button>
`;
lista.appendChild(li);
}

function salvar(nome){
let materias = JSON.parse(localStorage.getItem("materias")) || [];
materias.push(nome);
localStorage.setItem("materias", JSON.stringify(materias));
}

function removerMateria(botao,nome){
botao.parentElement.remove();
let materias = JSON.parse(localStorage.getItem("materias")) || [];
materias = materias.filter(m => m !== nome);
localStorage.setItem("materias", JSON.stringify(materias));
}

/* CALCULADORA */

function add(valor){
document.getElementById("calcDisplay").value += valor;
}

function limpar(){
document.getElementById("calcDisplay").value = "";
}

function calcular(){
let display = document.getElementById("calcDisplay");
try{
display.value = eval(display.value);
}catch{
display.value = "Erro";
}
}

/* QUIZ */

function corrigir(){

let pontos = 0;

if(document.getElementById("p1").value == 10) pontos++;
if(document.getElementById("p2").value == 27) pontos++;
if(document.getElementById("p3").value == 8) pontos++;
if(document.getElementById("p4").value == 5) pontos++;

document.getElementById("resultado").innerHTML =
"Você acertou " + pontos + " de 4 perguntas!";

}

</script>

</body>
</html>
